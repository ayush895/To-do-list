<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Todos</h1>
        </header>

        <main>
            <!-- Add Todo Section -->
            <section class="add-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoTitle" 
                        class="input-field" 
                        placeholder="Add a new todo..."
                        aria-label="Todo title"
                    >
                    <button id="addBtn" class="btn btn-primary">Add</button>
                </div>
                <textarea 
                    id="todoDescription" 
                    class="textarea-field" 
                    placeholder="Add a description (optional)"
                    aria-label="Todo description"
                ></textarea>
                <div class="date-inputs">
                    <label for="todoDueDate">Due Date (optional):</label>
                    <input type="date" id="todoDueDate" aria-label="Due date">
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </section>

            <!-- Search and Filter Section -->
            <section class="search-filter">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-field" 
                    placeholder="Search todos..."
                    aria-label="Search todos"
                >
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort-buttons">
                    <select id="sortSelect" aria-label="Sort options">
                        <option value="created-new">Newest First</option>
                        <option value="created-old">Oldest First</option>
                        <option value="due-date">Due Date (Nearest)</option>
                    </select>
                </div>
            </section>

            <!-- Todos List -->
            <section class="todos-list" id="todosList">
                <!-- todos will be rendered here -->
            </section>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <p>No todos yet. Create one to get started!</p>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Todo</h2>
                <button class="modal-close" id="closeModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" class="input-field">
                </div>
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" class="textarea-field"></textarea>
                </div>
                <div class="form-group">
                    <label for="editDueDate">Due Date</label>
                    <input type="date" id="editDueDate">
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveBtn" class="btn btn-primary">Save</button>
                <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Delete Todo?</h2>
            </div>
            <p class="modal-message">Are you sure you want to delete this todo? This action cannot be undone.</p>
            <div class="modal-footer">
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
